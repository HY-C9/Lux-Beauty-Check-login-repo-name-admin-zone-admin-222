<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Admin - Lux Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="https://i.ibb.co/WvZQysJ3/image.png">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            margin: 0; 
            background-color: #fdfaf6; /* พื้นหลังสีครีมอุ่นตามโลโก้ */
            min-height: 100vh;
        }

        /* 🌊 ตั้งค่า Canvas ให้อยู่ด้านหลังสุด */
        #water-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* สไตล์กระจกฝ้า (Glassmorphism) โทนโรสโกลด์ */
        .glass-container {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(224, 194, 169, 0.6);
            border-radius: 20px;
            box-shadow: 0 12px 35px 0 rgba(194, 149, 128, 0.25);
            overflow: hidden;
            position: relative;
        }

        /* แถบสีด้านบน โทน Rose Gold/Gold */
        .modal-header-rose-gold { 
            background: linear-gradient(90deg, #eecdbb, #c48c71, #a8684d); 
            height: 8px; width: 100%; position: absolute; top: 0; left: 0; 
        }
        
        /* ปุ่มสีโรสโกลด์ทองหรู */
        .btn-gold {
            background: linear-gradient(180deg, #dfb39e 0%, #c48c71 50%, #a8684d 100%);
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 104, 77, 0.3);
        }
        .btn-gold:hover {
            background: linear-gradient(180deg, #ebd1c5 0%, #dfb39e 50%, #c48c71 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 104, 77, 0.4);
        }
        .btn-gold:active {
            transform: translateY(1px);
            box-shadow: 0 2px 10px rgba(168, 104, 77, 0.3);
        }

        /* ปุ่มออกจากระบบโทนน้ำตาลเข้ม */
        .btn-dark-brown {
            background-color: #5c3a28;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-dark-brown:hover {
            background-color: #7a4831;
        }

        /* สถานะการผ่าน/ไม่ผ่าน */
        .select-status { padding: 6px 12px; border-radius: 10px; font-size: 13px; font-weight: 600; outline: none; cursor: pointer; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .select-status.pass { background-color: #f0fdf4; color: #059669; border-color: #10b981; }
        .select-status.fail { background-color: #fef2f2; color: #ef4444; border-color: #ef4444; }
        
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .animate-scale { animation: scaleIn 0.3s ease-out; }
    </style>
</head>
<body class="flex flex-col relative overflow-x-hidden">

    <canvas id="water-canvas"></canvas>

    <div id="adminLoginOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-md flex items-center justify-center z-[200] p-6">
        <div class="bg-[#fdfaf6] w-full max-w-sm rounded-3xl p-8 text-center shadow-2xl relative overflow-hidden animate-scale border border-[#e8c9bb]">
            <div class="modal-header-rose-gold"></div>
            <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl border border-[#d4a387] shadow-sm text-[#c48c71]">🔐</div>
            <h3 class="text-xl font-bold text-[#7a4831] mb-1">System Login</h3>
            <p class="text-xs text-[#c48c71] mb-6 font-bold uppercase tracking-wider">Lux Beauty Admin</p>
            
            <div class="text-left mb-4">
                <label class="text-xs font-bold text-[#965a3e] ml-1 uppercase">Username (ชื่อผู้ใช้)</label>
                <input id="adminUserInput" type="text" placeholder="พิมพ์ชื่อผู้ใช้" class="w-full bg-white border border-[#e8c9bb] rounded-xl py-3 px-4 mt-1 text-[16px] outline-none focus:border-[#c48c71] focus:ring-1 focus:ring-[#c48c71] transition-colors text-[#5c3a28]">
            </div>

            <div class="text-left mb-8">
                <label class="text-xs font-bold text-[#965a3e] ml-1 uppercase">Password (รหัสผ่าน)</label>
                <input id="adminPassInput" type="password" placeholder="••••••••" class="w-full bg-white border border-[#e8c9bb] rounded-xl py-3 px-4 mt-1 text-[16px] outline-none focus:border-[#c48c71] focus:ring-1 focus:ring-[#c48c71] transition-colors text-[#5c3a28]">
            </div>

            <div class="flex gap-3">
                <button onclick="verifyAdmin()" class="w-full btn-gold rounded-xl py-3.5 font-bold text-sm">เข้าสู่ระบบแผงควบคุม</button>
            </div>
        </div>
    </div>

    <div id="admin-page" class="hidden flex-col p-4 md:p-6 max-w-6xl mx-auto w-full z-10">
        <div class="glass-container p-6 md:p-8 w-full mt-4 animate-scale">
            <div class="modal-header-rose-gold"></div>
            
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 mt-2 gap-4">
                <div class="flex items-center gap-3">
                    <img src="https://i.ibb.co/R4j6Msx0/image.png" class="w-14 h-14 rounded-full border-2 border-white shadow-md bg-white object-cover">
                    <h2 class="text-2xl font-bold text-[#7a4831] drop-shadow-sm tracking-wide">⚙️ แผงควบคุม (Admin)</h2>
                </div>
                <div class="flex gap-3 w-full md:w-auto">
                    <button id="bulkDelBtn" onclick="bulkDelete()" class="hidden flex-1 md:flex-none bg-red-500 text-white px-4 py-2.5 rounded-xl text-xs font-bold shadow-md hover:bg-red-600 transition-all">🗑️ ลบที่เลือก (<span id="selectedCount">0</span>)</button>
                    <button onclick="logoutAdmin()" class="flex-1 md:flex-none btn-dark-brown font-bold text-sm px-6 py-2.5 rounded-xl shadow-md">ออกจากระบบ</button>
                </div>
            </div>
            
            <div class="bg-white/60 p-6 rounded-3xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-6 border border-[#d4a387]/50 shadow-sm backdrop-blur-md">
                <input id="newShop" type="text" placeholder="ชื่อร้านค้า" class="p-3.5 rounded-xl border border-[#e8c9bb] outline-none focus:ring-2 focus:ring-[#c48c71] text-[15px] shadow-sm bg-white text-[#5c3a28]">
                <input id="newOwner" type="text" placeholder="ชื่อผู้รับ" class="p-3.5 rounded-xl border border-[#e8c9bb] outline-none focus:ring-2 focus:ring-[#c48c71] text-[15px] shadow-sm bg-white text-[#5c3a28]">
                <input id="newAddr" type="text" placeholder="ที่อยู่จัดส่ง" class="p-3.5 rounded-xl border border-[#e8c9bb] outline-none focus:ring-2 focus:ring-[#c48c71] text-[15px] shadow-sm bg-white lg:col-span-2 text-[#5c3a28]">
                <select id="newStatus" class="p-3.5 rounded-xl border border-[#e8c9bb] outline-none font-bold text-[#b87c63] text-[15px] shadow-sm bg-white">
                    <option value="ผ่าน">✅ ผ่าน</option>
                    <option value="ไม่ผ่าน">❌ ไม่ผ่าน</option>
                </select>
                <button id="addBtn" onclick="addShop()" class="lg:col-span-5 btn-gold py-4 rounded-xl font-bold text-[15px]">บันทึกข้อมูล ☁️</button>
            </div>

            <div class="mb-4">
                <input id="adminSearchInput" type="text" oninput="render()" placeholder="🔍 ค้นหาร้านค้าหรือชื่อผู้รับในตาราง..." class="w-full p-4 rounded-2xl border border-[#e8c9bb] bg-white/90 outline-none focus:ring-2 focus:ring-[#c48c71] transition-all text-[15px] shadow-inner text-[#5c3a28] placeholder:text-[#d4a387]">
            </div>

            <div class="max-h-[500px] overflow-y-auto border border-[#d4a387]/50 bg-white/70 rounded-2xl shadow-inner backdrop-blur-md">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-[#fdfaf6]/95 backdrop-blur-md z-10 border-b-2 border-[#d4a387] shadow-sm">
                        <tr class="text-[#965a3e] text-sm">
                            <th class="p-4 w-10"><input type="checkbox" id="selectAll" onclick="toggleAll(this)" class="w-4 h-4 accent-[#c48c71]"></th>
                            <th class="p-4 font-bold uppercase tracking-wider">ร้านค้า</th>
                            <th class="p-4 font-bold uppercase tracking-wider">ชื่อผู้รับ</th>
                            <th class="p-4 font-bold uppercase tracking-wider">สถานะ</th>
                            <th class="p-4 text-center font-bold uppercase tracking-wider">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="shopTable" class="bg-transparent"></tbody>
                </table>
            </div>
            <div id="loading" class="hidden text-center text-[#c48c71] mt-6 animate-pulse font-bold text-sm bg-white py-2 rounded-full w-fit mx-auto px-6 border border-[#d4a387] shadow-sm">⏳ กำลังซิงค์ข้อมูลกับฐานข้อมูล...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, updateDoc, onSnapshot, serverTimestamp, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD9SnhLqRijMJIsNpStmsPSWrXsiFxn-gs",
            authDomain: "mombaby-check.firebaseapp.com",
            projectId: "mombaby-check",
            storageBucket: "mombaby-check.firebasestorage.app",
            messagingSenderId: "948432082279",
            appId: "1:948432082279:web:61b1dfd215c02582f6cbc2",
            measurementId: "G-MX9SD1GC7P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 🌊 ระบบ Water Canvas Animation ---
        const canvas = document.getElementById('water-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let time = 0;
        function animateWater() {
            ctx.clearRect(0, 0, width, height);
            let gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#fdfaf6'); 
            gradient.addColorStop(1, '#fceddf'); 
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = 'rgba(235, 201, 178, 0.45)';
            ctx.beginPath();
            ctx.moveTo(0, height);
            for (let i = 0; i <= width; i += 10) {
                let y = height * 0.45 + Math.sin(i * 0.005 + time) * 45 + Math.cos(i * 0.008 + time) * 35;
                ctx.lineTo(i, y);
            }
            ctx.lineTo(width, height);
            ctx.fill();

            ctx.fillStyle = 'rgba(212, 163, 135, 0.5)';
            ctx.beginPath();
            ctx.moveTo(0, height);
            for (let i = 0; i <= width; i += 10) {
                let y = height * 0.6 + Math.sin(i * 0.006 - time * 1.5) * 55 + Math.cos(i * 0.004 - time) * 25;
                ctx.lineTo(i, y);
            }
            ctx.lineTo(width, height);
            ctx.fill();

            time += 0.015; 
            requestAnimationFrame(animateWater);
        }
        animateWater();

        let globalDb = [];

        // --- Auth System ---
        window.checkAdminSession = function() {
            const expiry = localStorage.getItem('premiumKidsAdminSession');
            if (expiry && Date.now() < parseInt(expiry, 10)) return true;
            localStorage.removeItem('premiumKidsAdminSession');
            return false;
        }

        window.initApp = function() {
            if (window.checkAdminSession()) {
                document.getElementById('adminLoginOverlay').classList.replace('flex', 'hidden');
                document.getElementById('admin-page').classList.replace('hidden', 'flex');
                startRealtimeListener();
            }
        }

        window.verifyAdmin = function() {
            const user = document.getElementById('adminUserInput').value.trim();
            const pass = document.getElementById('adminPassInput').value;
            if(user === "admin" && pass === "22222") { 
                const expiryTime = Date.now() + (5 * 24 * 60 * 60 * 1000);
                localStorage.setItem('premiumKidsAdminSession', expiryTime);
                document.getElementById('adminLoginOverlay').classList.replace('flex', 'hidden');
                document.getElementById('admin-page').classList.replace('hidden', 'flex');
                startRealtimeListener();
            } else { alert("รหัสผ่านไม่ถูกต้อง!"); }
        }

        window.logoutAdmin = function() {
            if(confirm("ออกจากระบบใช่หรือไม่?")) {
                localStorage.removeItem('premiumKidsAdminSession');
                location.reload();
            }
        }

        window.initApp(); 

        // --- Data System ---
        function startRealtimeListener() {
            document.getElementById('loading').classList.remove('hidden');
            const q = query(collection(db, "address_mom_baby2"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                globalDb = [];
                snapshot.forEach((doc) => { globalDb.push({ id: doc.id, ...doc.data() }); });
                window.render();
                document.getElementById('loading').classList.add('hidden');
            }, (error) => {
                console.error(error);
                onSnapshot(collection(db, "address_mom_baby2"), (snap) => {
                    globalDb = [];
                    snap.forEach((d) => globalDb.push({id: d.id, ...d.data()}));
                    window.render();
                });
            });
        }

        window.render = function() {
            const tbody = document.getElementById('shopTable');
            const searchVal = document.getElementById('adminSearchInput').value.toLowerCase();
            if (!tbody) return;
            const filtered = globalDb.filter(s => (s.Name && String(s.Name).toLowerCase().includes(searchVal)) || (s.Owner && String(s.Owner).toLowerCase().includes(searchVal)));
            let htmlString = ""; 
            filtered.forEach((s) => {
                const sStatus = s.Status || 'รอตรวจสอบ';
                const statusClass = (sStatus === 'ผ่าน' || sStatus === 'pass') ? 'pass' : 'fail';
                htmlString += `<tr class="border-b border-[#e8c9bb]/40 text-[15px] hover:bg-white/80 transition-colors">
                    <td class="p-4"><input type="checkbox" class="shop-check w-4 h-4 accent-[#c48c71]" value="${s.id}" onchange="updateBulkUI()"></td>
                    <td class="p-4 font-bold text-[#b87c63]">${s.Name || '-'}</td>
                    <td class="p-4 text-[#7a4831] font-medium">${s.Owner || '-'}</td>
                    <td class="p-4">
                        <select onchange="updateStatus('${s.id}', this.value)" class="select-status ${statusClass} bg-white/90">
                            <option value="ผ่าน" ${(sStatus === 'ผ่าน' || sStatus === 'pass') ? 'selected' : ''}>✅ ผ่าน</option>
                            <option value="ไม่ผ่าน" ${(sStatus === 'ไม่ผ่าน' || sStatus === 'fail') ? 'selected' : ''}>❌ ไม่ผ่าน</option>
                        </select>
                    </td>
                    <td class="p-4 text-center">
                        <button onclick="deleteShop('${s.id}', '${s.Name}')" class="text-red-500 font-bold p-2 hover:bg-red-50 hover:scale-110 rounded-lg transition-all">🗑️ ลบ</button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = htmlString; 
            window.updateBulkUI();
        }

        window.toggleAll = function(m) { document.querySelectorAll('.shop-check').forEach(ck => ck.checked = m.checked); window.updateBulkUI(); }
        window.updateBulkUI = function() {
            const checked = document.querySelectorAll('.shop-check:checked');
            const btn = document.getElementById('bulkDelBtn');
            const count = document.getElementById('selectedCount');
            if(count) count.innerText = checked.length;
            if(btn) { if(checked.length > 0) btn.classList.remove('hidden'); else btn.classList.add('hidden'); }
        }

        window.addShop = async function() {
            const name = document.getElementById('newShop').value.trim();
            const owner = document.getElementById('newOwner').value.trim();
            const addr = document.getElementById('newAddr').value.trim();
            const status = document.getElementById('newStatus').value;
            if(!name || !owner) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
            document.getElementById('addBtn').disabled = true;
            try {
                await addDoc(collection(db, "address_mom_baby2"), { Name: name, Owner: owner, Address: addr, Status: status, timestamp: serverTimestamp() });
                document.getElementById('newShop').value = ''; document.getElementById('newOwner').value = ''; document.getElementById('newAddr').value = '';
                alert("บันทึกสำเร็จ!");
            } catch (e) { alert("ล้มเหลว"); } finally { document.getElementById('addBtn').disabled = false; }
        }

        window.updateStatus = async function(id, st) {
            try { await updateDoc(doc(db, "address_mom_baby2", id), { Status: st }); } catch (e) { alert("อัปเดตไม่สำเร็จ"); }
        }

        window.deleteShop = async function(id, n) {
            if(!confirm(`ลบร้าน "${n}"?`)) return;
            try { await deleteDoc(doc(db, "address_mom_baby2", id)); } catch (e) { alert("ลบไม่สำเร็จ"); }
        }

        window.bulkDelete = async function() {
            const checked = document.querySelectorAll('.shop-check:checked');
            if(!confirm(`ลบ ${checked.length} รายการ?`)) return;
            for(let box of checked) { await deleteDoc(doc(db, "address_mom_baby2", box.value)); }
            alert("ลบสำเร็จ!");
        }
    </script>
</body>
</html>
